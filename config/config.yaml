# RedHouse Home Automation Configuration
# This file is committed to git - do NOT put secrets or PII here.
# Secrets and PII go in .env (not committed).
# Sensor mapping goes in config/sensors.yaml (not committed).

heating:
  # Heating curve: outdoor temperature (C) -> hours to heat per day
  curve:
    -20: 12
    0: 6
    16: 2

  # EVU off (hot water heating blocked) configuration
  # threshold is total price in EUR/kWh (including transfer + tax)
  evuoff_threshold_price: 0.40
  evuoff_max_continuous_hours: 4

  # Load definitions
  loads:
    geothermal_pump:
      enabled: true
      priority: 1
      power_kw: 3.0
      control_type: mlp_i2c
    garage_heater:
      enabled: false
      priority: 2
      power_kw: 2.0
      control_type: shelly_relay
    ev_charger:
      enabled: false
      priority: 3
      power_kw: 11.0
      control_type: ocpp

hardware:
  pump_i2c_bus: 1
  pump_i2c_address: 0x10
  shelly_relay_url: http://192.168.1.5
  shelly_em3_url: http://192.168.1.5

data_collection:
  temperature:
    interval_minutes: 1
    retry_attempts: 20
    identical_readings_required: 3
    backup_identical_readings: 2
    exclude_sensors:
      - "e9"

  spot_prices:
    value_added_tax: 1.255
    sellers_margin: 0.50
    production_buyback_margin: 0.30
    transfer_day_price: 2.59
    transfer_night_price: 1.35
    transfer_tax_price: 2.79372

scheduling:
  generate_program_time: "16:05"
  execute_program_interval_minutes: 15
  mlp_evu_cycle_interval_hours: 2

logging:
  level: INFO
  dir: /var/log/redhouse
  max_bytes: 10485760
  backup_count: 5
